# Tokyonight Moon Theme for Kitty
# https://github.com/folke/tokyonight.nvim

# Basic
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Tokyonight Moon Colors
background              #1e2030
foreground              #c0caf5

# Normal colors
color0   #1a1b26
color1   #f7768e
color2   #9ece6a
color3   #e0af68
color4   #7aa2f7
color5   #bb9af7
color6   #7dcfff
color7   #a9b1d6

# Bright colors
color8   #414868
color9   #f7768e
color10  #9ece6a
color11  #e0af68
color12  #7aa2f7
color13  #bb9af7
color14  #7dcfff
color15  #c0caf5

# Cursor
cursor                  #c0caf5
cursor_text_color       #1e2030

# Selection
selection_foreground    #c0caf5
selection_background    #7aa2f7

# Tabs
active_tab_foreground   #7aa2f7
active_tab_background   #1e2030
inactive_tab_foreground #565f89
inactive_tab_background #16161e

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Window padding
window_padding_width 8
window_margin_width 0

# Other
enable_audio_bell no
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
