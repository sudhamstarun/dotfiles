# Change prefix to backtick
set -g prefix `
unbind C-b
bind ` send-prefix

# Sensible defaults
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g display-time 3000

# Better pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window splitting
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Session management
bind S choose-session
bind N new-session

# Catppuccin Mocha Theme
set -g default-terminal "screen-256color"
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#1e1e2e,fg=#cba6f7] #S #[bg=#1e1e2e,fg=#cba6f7] "
set -g status-right "#[bg=#1e1e2e,fg=#a6e3a1] %H:%M #[bg=#1e1e2e,fg=#89b4fa] %Y-%m-%d "
set -g status-left-length 20
set -g status-right-length 40
set -g status-justify left

set -g window-status-format "#[fg=#45475a]#I:#W "
set -g window-status-current-format "#[bg=#1e1e2e,fg=#f5c2e7]#I:#W "
set -g window-status-separator ""

set -g pane-border-style "fg=#1e1e2e"
set -g pane-active-border-style "fg=#cba6f7"

set -g message-style "fg=#cba6f7,bg=#1e1e2e"
set -g mode-style "fg=#cba6f7,bg=#313244"

# Custom layout: 70% nvim (left) + 30% terminals split horizontally (right)
bind D run-shell '~/.tmux/layouts/dev-layout.sh'
